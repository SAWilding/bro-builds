<!DOCTYPE html>
<html lang="Eng">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Bro Builds</title> 
        <link rel="stylesheet" href="style.css" />
        <style>
            textarea,
            label,
            input {
                display: block;
            }
            label {
                margin-top: 15px;
            }
            textarea {
                width: 100%;
                height: 300px;
            }
        </style>
    </head>
    <body>
        <div id="content">
            <header>
                <div class="logo-box">
                    <img src="/images/Bro_Builds_logo.png" alt="logo" class="logo">
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="viewProjects.html">View Projects</a></li>
                        <li><a href="postaProject.html">Post a Project</a></li>
                    </ul>
                </nav>
            </header>
            <main>
                <form>
                    <label for="first_name">First Name:</label>
                    <input type="text" id="first_name" name="first_name" />
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email"/>
                    <label for="message">Enter your project here:</label>
                    <textarea id="message" name="message"></textarea>
                </form>
            </main>
            <footer>
                <p class="copyright"> Copyright &copy; 2021 Bro Builds </p>
            </footer>
        </div>
    </body>
</html>
